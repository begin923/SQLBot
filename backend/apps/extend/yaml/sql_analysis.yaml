  ## 【带表别名的SQL解析示例】
  
  **输入 SQL：**
  ```sql
  INSERT INTO dws.dws_collect_semen_stat
  SELECT
    org.id as org_id,
    mat.parity,
    sum(sc.collect_semen_num) as collect_semen_num
  FROM yz_datawarehouse_dwd.dwd_aibreeding_collect_semen_plan sc
  JOIN yz_datawarehouse_dim.dim_hmc_plus_org_farm_entity org ON org.entity_farm_id = sc.org_id
  JOIN yz_datawarehouse_dim.dim_pig_maternal mat ON mat.pig_id = sc.pig_id
  GROUP BY org.id, mat.parity;
  ```
  

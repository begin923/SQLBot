  ## 【校验规则】
  1. 嵌套聚合检测：formula 含 SUM(SUM、COUNT(COUNT 等 → validation_status: invalid
  2. 跨表检测：source_tables 数量>1 或 joins 非空 → is_cross_table: true
  3. 下钻支持：维度字段 support_drill_down: true，指标字段 support_drill_down: false
  4. GROUP BY 标识：用于 GROUP BY 的字段 is_group_by_field: true
  5. 字段类型：public_dim（公共维度）、private_dim（私有维度）、metric（指标）、normal（普通字段）
  6. 表名规范：所有表名必须含完整表名（schema.表）
  7. **⚠️ formula 字段别名替换**：如果 SQL 中使用表别名（如 `mat.parity`），必须在 formula 中替换为物理表名（如 `yz_datawarehouse_dim.dim_hmc_plus_org_farm_entity.parity`）
  8. 布尔值规范：必须用 true/false，禁止用 是/否/支持/不支持
  9. 时间格式：必须使用 ISO8601 格式（YYYY-MM-DDTHH:MM:SSZ）
  10. 完整性校验：fields 数组必须覆盖 SELECT 子句中的所有字段


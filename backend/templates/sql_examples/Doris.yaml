template:
  quot_rule: |
    <rule>
      必须对数据库名、表名、字段名、别名外层加反引号（`）。
      <note>
        1. 点号（.）不能包含在反引号内，必须写成 `database`.`table`
        2. 当标识符为关键字、含特殊字符或需保留大小写时必须加反引号
        3. Doris 标识符默认不区分大小写，但建议统一使用反引号
      </note>
    </rule>

  limit_rule: |
    <rule>
      当需要限制行数时，必须使用标准的LIMIT语法
      <note>
        1. 标准写法：LIMIT [count]
        2. 分页写法：LIMIT [count] OFFSET [start]
        3. 支持 MySQL 兼容写法：LIMIT [offset], [count]
      </note>
    </rule>

  other_rule: |
    <rule>必须为每个表生成别名（不加AS）</rule>
    <rule>禁止使用星号(*)，必须明确字段名</rule>
    <rule>中文/特殊字符字段需保留原名并添加英文别名</rule>
    <rule>函数字段必须加别名</rule>
    <rule>百分比显示为：CONCAT(ROUND(x*100,2),'%')</rule>
    <rule>避免与Doris关键字冲突（如`rank`/`partition`/`values`）</rule>
    <rule>分区查询需使用PARTITION语句明确指定</rule>
    <rule>在涉及多表关联的情况，部分表需要分组聚合时，请使用子查询的方式实现</rule>
    <rule>严格根据提供的表结构生成SQL，不要添加不存在的字段，特别是常见的系统字段如create_time、update_time、created_at、updated_at等</rule>
    <rule>在生成任何字段之前，必须确认该字段确实存在于提供的表结构中</rule>
    <rule>如果存在<drilldown-table-structures>块，请务必严格基于其中提供的表结构信息生成SQL，不要引用其中未提及的字段</rule>
    <rule>当处理下钻分析请求时，应完全忽略<m-schema>中的表结构信息，只依据<drilldown-table-structures>中提供的实际表结构生成SQL</rule>
    <rule>当用户问题中存在且能提取可执行的sql时，应完全忽略<m-schema>中的表结构信息，只依据提取的SQL</rule>

  basic_example: |
    <basic-examples>
      <intro>
        📌 以下示例严格遵循<Rules>中的 Doris 规范，展示符合要求的 SQL 写法与典型错误案例。
        ⚠️ 注意：示例中的表名、字段名均为演示虚构，实际使用时需替换为用户提供的真实标识符。
        🔍 重点观察：
          1. 双引号包裹所有数据库对象的规范用法
          2. 中英别名/百分比/函数等特殊字段的处理
          3. 关键字冲突的规避方式
      </intro>
      <example>
        <input>查询 test.orders 表的前100条订单（含中文字段和百分比）</input>
        <output-bad>
          SELECT * FROM test.orders LIMIT 100  -- 错误：使用星号
          SELECT `订单ID`, `金额` FROM `test`.`orders` `t1` LIMIT 100  -- 错误：缺少英文别名
          SELECT COUNT(`订单ID`) FROM `test`.`orders` `t1`  -- 错误：函数未加别名
        </output-bad>
        <output-good>
          SELECT 
            `t1`.`订单ID` AS `order_id`,
            `t1`.`金额` AS `amount`,
            COUNT(`t1`.`订单ID`) AS `total_orders`,
            CONCAT(ROUND(`t1`.`折扣率` * 100, 2), '%') AS `discount_percent`
          FROM `test`.`orders` `t1`
          LIMIT 100
        </output-good>
      </example>
    
      <example>
        <input>统计用户表 dw.users（含分区字段和关键字rank）的活跃占比</input>
        <output-bad>
          SELECT rank, status FROM dw.users  -- 错误：未处理关键字
          SELECT `rank`, ROUND(active_ratio*100) FROM `dw`.`users`  -- 错误：百分比格式错误
        </output-bad>
        <output-good>
          SELECT 
            `u`.`rank` AS `user_rank`,
            CONCAT(ROUND(`u`.`active_ratio` * 100, 2), '%') AS `active_percent`
          FROM `dw`.`users` `u`
          WHERE `u`.`status` = 1
          AND `u`.`dt` = '2024-01-01'  -- Doris分区字段过滤
          LIMIT 1000
        </output-good>
      </example>
    </basic-examples>

  example_engine: Apache Doris 2.0
  example_answer_1: |
    {"success":true,"sql":"SELECT `country` AS `country_name`, `continent` AS `continent_name`, `year` AS `year`, `gdp` AS `gdp_usd` FROM `Sample_Database`.`sample_country_gdp` ORDER BY `country`, `year`","tables":["sample_country_gdp"],"chart-type":"line"}
  example_answer_1_with_limit: |
    {"success":true,"sql":"SELECT `country` AS `country_name`, `continent` AS `continent_name`, `year` AS `year`, `gdp` AS `gdp_usd` FROM `Sample_Database`.`sample_country_gdp` ORDER BY `country`, `year` LIMIT 1000","tables":["sample_country_gdp"],"chart-type":"line"}
  example_answer_2: |
    {"success":true,"sql":"SELECT `country` AS `country_name`, `gdp` AS `gdp_usd` FROM `Sample_Database`.`sample_country_gdp` WHERE `year` = '2024' ORDER BY `gdp` DESC","tables":["sample_country_gdp"],"chart-type":"pie"}
  example_answer_2_with_limit: |
    {"success":true,"sql":"SELECT `country` AS `country_name`, `gdp` AS `gdp_usd` FROM `Sample_Database`.`sample_country_gdp` WHERE `year` = '2024' ORDER BY `gdp` DESC LIMIT 1000","tables":["sample_country_gdp"],"chart-type":"pie"}
  example_answer_3: |
    {"success":true,"sql":"SELECT forage_agg.org_name, forage_agg.group_code, forage_agg.dt_date, forage_agg.yz_id, forage_agg.total_forage_weight_kg, (weight.last_day_weight_new - weight.pre_weight) / 1000.0 AS daily_gain_kg, CASE WHEN (weight.last_day_weight_new - weight.pre_weight) != 0 THEN forage_agg.total_forage_weight_kg / ((weight.last_day_weight_new - weight.pre_weight) / 1000.0) ELSE NULL END AS feed_to_gain_ratio FROM ( SELECT org_name, group_code, dt_date, yz_id, org_id, SUM(forage_weight_kg) AS total_forage_weight_kg FROM `yz_datawarehouse_dwd`.`dwd_fpf_porker_forage_record_detail` GROUP BY org_name, group_code, dt_date, yz_id, org_id ) AS forage_agg JOIN `yz_datawarehouse_dwd`.`dwd_fpf_feed_sorter_weight_record` AS weight ON forage_agg.org_id = weight.org_id AND forage_agg.dt_date = weight.dt_date AND forage_agg.group_code = weight.group_code AND forage_agg.yz_id = weight.yz_id ORDER BY forage_agg.org_name, forage_agg.group_code, forage_agg.dt_date, forage_agg.yz_id LIMIT 1000
                           ","tables":["dwd_fpf_porker_forage_record_detail","dwd_fpf_feed_sorter_weight_record"],"chart-type":"table"}
  example_answer_3_with_limit: |
    {"success":true,"sql":"SELECT forage_agg.org_name, forage_agg.group_code, forage_agg.dt_date, forage_agg.yz_id, forage_agg.total_forage_weight_kg, (weight.last_day_weight_new - weight.pre_weight) / 1000.0 AS daily_gain_kg, CASE WHEN (weight.last_day_weight_new - weight.pre_weight) != 0 THEN forage_agg.total_forage_weight_kg / ((weight.last_day_weight_new - weight.pre_weight) / 1000.0) ELSE NULL END AS feed_to_gain_ratio FROM ( SELECT org_name, group_code, dt_date, yz_id, org_id, SUM(forage_weight_kg) AS total_forage_weight_kg FROM `yz_datawarehouse_dwd`.`dwd_fpf_porker_forage_record_detail` GROUP BY org_name, group_code, dt_date, yz_id, org_id ) AS forage_agg JOIN `yz_datawarehouse_dwd`.`dwd_fpf_feed_sorter_weight_record` AS weight ON forage_agg.org_id = weight.org_id AND forage_agg.dt_date = weight.dt_date AND forage_agg.group_code = weight.group_code AND forage_agg.yz_id = weight.yz_id ORDER BY forage_agg.org_name, forage_agg.group_code, forage_agg.dt_date, forage_agg.yz_id LIMIT 1000
                           ","tables":["dwd_fpf_porker_forage_record_detail","dwd_fpf_feed_sorter_weight_record"],"chart-type":"table"}